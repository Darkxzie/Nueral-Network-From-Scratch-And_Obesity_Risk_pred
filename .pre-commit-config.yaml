repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
        args:
          - --config=.gitleaks.toml
          - --redact

  - repo: local
    hooks:
      - id: black
        name: black
        entry: python -m black --check submission_artifacts tests
        language: system
        pass_filenames: false
      - id: nbqa-black
        name: nbqa-black
        entry: python -m nbqa black --check notebooks/neural_network_from_scratch.ipynb
        language: system
        pass_filenames: false
      - id: ruff
        name: ruff
        entry: python -m ruff check submission_artifacts tests
        language: system
        pass_filenames: false
      - id: nbqa-ruff
        name: nbqa-ruff
        entry: python -m nbqa ruff notebooks/neural_network_from_scratch.ipynb --ignore=E501
        language: system
        pass_filenames: false
      - id: type-check
        name: type-check
        entry: python -m mypy submission_artifacts
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
